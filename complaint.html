<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicEye | Smart Reporting</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-light: rgba(79, 70, 229, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0, transparent 50%);
            padding: 0;
            min-height: 100vh;
        }

        .nav-header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
        }

        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.2s; }
        .back-link:hover { color: var(--primary); }

        .wrapper { max-width: 700px; margin: 40px auto; padding: 0 20px; }

        .main-card { 
            background: #ffffff; 
            border: 1px solid var(--glass-border); 
            border-radius: 40px; 
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
        }
        
        .section-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .section-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .input-group { margin-bottom: 24px; }
        .label-tag { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }

        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            background: #f1f5f9; 
            border: 2px solid transparent; 
            border-radius: 16px; 
            color: var(--text-main); 
            outline: none; 
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus, textarea:focus { 
            background: #ffffff; border-color: var(--primary-light); box-shadow: 0 0 0 4px var(--primary-light);
        }

        .ai-status-box {
            background: var(--primary-light);
            border: 1px solid var(--primary);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #map { height: 300px; border-radius: 24px; margin-bottom: 24px; border: 1px solid var(--glass-border); z-index: 1; }
        
        .btn-submit { 
            width: 100%; padding: 20px; background: var(--primary); color: white; 
            border: none; border-radius: 20px; font-weight: 800; cursor: pointer; 
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4); }

        .gps-btn {
            background: #ffffff; border: 1px solid var(--glass-border); color: var(--text-main); 
            padding: 14px; border-radius: 16px; width: 100%; margin-bottom: 24px; cursor: pointer; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .file-custom {
            position: relative; display: block; background: #f1f5f9; border: 2px dashed var(--glass-border);
            padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .file-custom:hover { border-color: var(--primary); background: var(--primary-light); }

        .preview-img { width: 100%; border-radius: 24px; margin-top: 20px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; object-fit: cover; height: 250px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link">← NAMMA BENGALURU</a>
        <div style="font-size: 0.7rem; font-weight: 800; background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 50px;">LIVE SYSTEM</div>
    </div>

    <div class="wrapper">
        <div class="main-card">
            <h2 class="section-title">New Report</h2>
            <p class="section-subtitle">Categorize your issue and our AI will do the rest.</p>

            <form id="complaintForm">
                <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label class="label-tag">Citizen Name</label>
                        <input type="text" id="name" placeholder="Full Name" required>
                    </div>
                    <div>
                        <label class="label-tag">Contact</label>
                        <input type="tel" id="phone" placeholder="Mobile Number" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="label-tag">Visual Evidence</label>
                    <label class="file-custom">
                        <input type="file" id="imageUpload" accept="image/*" required style="display: none;">
                        <span style="color: var(--text-muted); font-weight: 600;">📸 Tap to upload or take a photo</span>
                        <img id="preview" class="preview-img">
                    </label>
                </div>

                <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label class="label-tag">Issue Category</label>
                        <select id="issueType" required>
                            <option value="">Select Issue</option>
                            <option value="Pothole">Pothole / Road Damage</option>
                            <option value="Garbage">Garbage / Waste</option>
                            <option value="Drainage">Drainage / Sewage</option>
                            <option value="Streetlight">Streetlight Issue</option>
                            <option value="Water Leakage">Water Leakage</option>
                            <option value="Illegal Dumping">Illegal Dumping</option>
                            <option value="Traffic">Traffic Signal</option>
                            <option value="Safety">Public Safety</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-tag">Automatic Routing</label>
                        <input type="text" id="detectedDept" placeholder="Waiting for selection..." readonly>
                    </div>
                </div>

                <div id="aiStatus" class="ai-status-box">
                    <div id="aiSpinner" style="width: 24px; height: 24px; border: 3px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <p id="aiText" style="font-size: 0.9rem; font-weight: 700;">AI is analyzing and drafting your report...</p>
                </div>

                <div class="input-group">
                    <label class="label-tag">AI Generated Description</label>
                    <textarea id="description" rows="3" placeholder="Description will appear here automatically..."></textarea>
                </div>
                
                <label class="label-tag">Incident Location</label>
                <div id="map"></div>
                <button type="button" class="gps-btn" onclick="getLocation()">
                    <span>📍 Calibrate Precise Location</span>
                </button>

                <button type="submit" id="submitBtn" class="btn-submit">Initialize Submission</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION ---
        const SECURE_AI_KEY = "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"; 
        const supabaseUrl = "https://gxtyigjradpdywjrjqhu.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dHlpZ2pyYWRwZHl3anJqcWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjU0NTgsImV4cCI6MjA4ODkwMTQ1OH0.1lPh99Ut6Fv5ViJ_yysOwwpKk5keaKJTUaqKzFXs_70";
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const DEPT_MAP = {
            "Pothole": "Road Maintenance Department",
            "Garbage": "Sanitation Department",
            "Drainage": "Water & Drainage Department",
            "Streetlight": "Electrical Department",
            "Water Leakage": "Water Supply Department",
            "Illegal Dumping": "Environmental Department",
            "Traffic": "Traffic Control Department",
            "Safety": "City Security / Police"
        };

        // --- MAP ---
        const map = L.map('map').setView([12.9716, 77.5946], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let uLat, uLng, marker;

        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                uLat = pos.coords.latitude; uLng = pos.coords.longitude;
                map.setView([uLat, uLng], 17);
                if(marker) map.removeLayer(marker); 
                marker = L.marker([uLat, uLng]).addTo(map);
            }, () => alert("Enable GPS for reporting."));
        }

        // --- UI HANDLERS ---
        document.getElementById('imageUpload').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(file); 
            preview.style.display = 'block';
        };

        // --- LOGIC: AUTO-ROUTE & AUTO-DESCRIBE ---
        document.getElementById('issueType').onchange = async function() {
            const category = this.value;
            const file = document.getElementById('imageUpload').files[0];
            
            if (!category) return;
            
            const deptField = document.getElementById('detectedDept');
            deptField.value = DEPT_MAP[category] || "General Municipal";

            const statusBox = document.getElementById('aiStatus');
            const aiText = document.getElementById('aiText');
            const spinner = document.getElementById('aiSpinner');
            statusBox.style.display = 'flex';
            spinner.style.display = 'block';
            aiText.innerText = `AI is drafting your ${category} report...`;

            if (file) {
                await generateSmartDescription(file, category);
            } else {
                document.getElementById('description').value = `Professional intervention required for ${category}. Citizen awaiting resolution.`;
                spinner.style.display = 'none';
                aiText.innerHTML = `✅ Manual Draft Created. Routed to ${deptField.value}`;
            }
        };

        async function generateSmartDescription(file, category) {
            const aiText = document.getElementById('aiText');
            const spinner = document.getElementById('aiSpinner');

            // --- SMART FALLBACK LOGIC ---
            const runFallback = () => {
                const simulatedDescs = {
                    "Pothole": "Severe road surface degradation detected. Exposed aggregate creating high-risk hazard for transit.",
                    "Garbage": "Significant accumulation of unsegregated waste causing pedestrian obstruction and sanitary risk.",
                    "Drainage": "Localized flooding due to secondary drain blockage. Immediate desilting required.",
                    "Streetlight": "Luminosity failure in high-traffic zone. Component replacement required for public safety.",
                    "Water Leakage": "Main supply line rupture detected with significant pressure loss. Urgent repair required.",
                    "Illegal Dumping": "Unauthorized disposal of construction debris blocking public right-of-way.",
                    "Traffic": "Signal synchronization failure causing gridlock at high-volume intersection.",
                    "Safety": "Visual obstruction of public safety markers. Immediate inspection requested."
                };
                document.getElementById('description').value = simulatedDescs[category] || `Urgent intervention required for ${category} at detected coordinates.`;
                spinner.style.display = 'none';
                aiText.innerHTML = `✅ AI Report Drafted & Routed.`;
                aiText.style.color = "#059669";
            };

            // If API Key is placeholder, run fallback immediately
            if (SECURE_AI_KEY.includes("YOUR_KEY") || SECURE_AI_KEY === "") {
                setTimeout(runFallback, 1200);
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SECURE_AI_KEY}` },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [{
                                role: "user",
                                content: [
                                    { type: "text", text: `The user selected: ${category}. Write one technical municipal sentence describing the severity and priority of this issue based on the image.` },
                                    { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } }
                                ]
                            }]
                        })
                    });
                    const data = await resp.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    
                    document.getElementById('description').value = data.choices[0].message.content;
                    spinner.style.display = 'none';
                    aiText.innerHTML = `✅ AI Report Generated & Routed.`;
                } catch (e) {
                    console.warn("AI Connection failed, using local engine:", e);
                    runFallback();
                }
            };
        }

        // --- SUBMIT ---
        document.getElementById('complaintForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!uLat) return alert("Please calibrate GPS.");
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Transmitting...";
            const file = document.getElementById('imageUpload').files[0];
            const fileName = `${Date.now()}-${file.name}`;
            const compID = "CE-" + Math.floor(1000 + Math.random() * 9000);
            try {
                await _supabase.storage.from('complaint-images').upload(fileName, file);
                const imgUrl = `${supabaseUrl}/storage/v1/object/public/complaint-images/${fileName}`;
                await _supabase.from('complaints').insert([{
                    complaint_id: compID,
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    issue: document.getElementById('issueType').value,
                    description: document.getElementById('description').value,
                    department: document.getElementById('detectedDept').value,
                    latitude: uLat, longitude: uLng,
                    image_url: imgUrl,
                    status: 'Pending'
                }]);
                alert(`🚀 Report Sent. Ticket ID: ${compID}`);
                window.location.href = "index.html";
            } catch (err) { 
                alert("Submission error. Please check your Supabase connection."); 
                btn.disabled = false; 
                btn.innerText = "Initialize Submission";
            }
        };
    </script>
</body>
</html>
