<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicEye Admin | AI Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #4f46e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; transition: background 0.3s; }

        /* Login Screen */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 32px; border: 1px solid var(--glass-border); width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .login-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: #f8fafc; color: var(--text-main); outline: none; transition: 0.3s; }
        .login-btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Dashboard View */
        #adminDashboard { display: none; padding: 2rem; opacity: 0; transition: opacity 0.5s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .zones-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .zone-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border); }
        .count { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        .main-layout { display: grid; grid-template-columns: 2.2fr 1fr; gap: 20px; }
        .panel { background: white; border-radius: 24px; border: 1px solid var(--glass-border); padding: 30px; margin-bottom: 20px; }
        #heatmap { height: 400px; border-radius: 20px; border: 1px solid var(--glass-border); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .sms-btn { background: #10b981; border: none; color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .status-pill-pending { color: #f59e0b; font-size: 11px; font-weight: 700; background: rgba(245, 158, 11, 0.1); padding: 5px 10px; border-radius: 6px; }
        select { background: #f8fafc; border: 1px solid var(--glass-border); padding: 6px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="margin-bottom: 10px; letter-spacing: -1px;">Admin Portal</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">Ooru Command Center Credentials</p>
        <input id="username" class="login-input" placeholder="Username (admin)">
        <input id="password" type="password" class="login-input" placeholder="Password (1234)">
        <button onclick="handleLogin()" class="login-btn">Secure Login</button>
        <p id="loginError" style="color: #ef4444; font-size: 0.8rem; margin-top: 15px; display: none;">⚠️ Access Denied</p>
    </div>
</div>

<div id="adminDashboard">
    <div style="padding: 12px 2rem; margin: -2rem -2rem 30px -2rem; background: white; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-weight: 600;">← Exit to Home</a>
        <button onclick="logout()" style="padding:10px 20px; border-radius:12px; border:none; background:#fee2e2; color:#ef4444; cursor:pointer; font-weight: 700;">Logout</button>
    </div>

    <div class="header">
        <h1>🏛 CivicEye Command Center</h1>
    </div>

    <div class="zones-grid">
        <div class="zone-card"><h3>North Zone</h3><div id="count-North" class="count">0</div></div>
        <div class="zone-card"><h3>Central Zone</h3><div id="count-Central" class="count">0</div></div>
        <div class="zone-card"><h3>South Zone</h3><div id="count-South" class="count">0</div></div>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h3 style="margin-bottom:20px">Live Incident Stream</h3>
            <table>
                <thead>
                    <tr><th>Proof</th><th>ID</th><th>Zone</th><th>Issue</th><th>Status</th><th>Notify</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>

        <div class="side-panels">
            <div class="panel">
                <h3>Severity Heatmap</h3>
                <div id="heatmap" style="margin-top:15px;"></div>
            </div>
            
            <div class="panel">
                <h3>Dispatch Categories</h3>
                <div style="height: 300px; margin-top:15px;">
                    <canvas id="dispatchChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = "https://gxtyigjradpdywjrjqhu.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dHlpZ2pyYWRwZHl3anJqcWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjU0NTgsImV4cCI6MjA4ODkwMTQ1OH0.1lPh99Ut6Fv5ViJ_yysOwwpKk5keaKJTUaqKzFXs_70";
    const { createClient } = supabase;
    const supabaseClient = createClient(supabaseUrl, supabaseKey);

    const ADMIN_USER = "admin";
    const ADMIN_PASS = "1234";
    let map, heatLayer, dispatchChart;

    // Login Logic
    function handleLogin() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            sessionStorage.setItem("auth", "true");
            enterDashboard();
        } else {
            document.getElementById("loginError").style.display = "block";
        }
    }

    function enterDashboard() {
        document.getElementById("loginOverlay").style.display = "none";
        const dash = document.getElementById("adminDashboard");
        dash.style.display = "block";
        setTimeout(() => dash.style.opacity = "1", 50);
        initMap();
        initChart();
        fetchData();
        setInterval(fetchData, 30000);
    }

    function logout() { sessionStorage.removeItem("auth"); location.reload(); }

    if (sessionStorage.getItem("auth") === "true") { enterDashboard(); }

    function initMap() {
        if (map) return;
        map = L.map("heatmap").setView([12.9716, 77.5946], 11);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);
    }

    function initChart() {
        const ctx = document.getElementById('dispatchChart').getContext('2d');
        dispatchChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pothole', 'Garbage', 'Drainage', 'Streetlight', 'Water', 'Other'],
                datasets: [{
                    data: [0, 0, 0, 0, 0, 0],
                    backgroundColor: ['#4f46e5', '#8b5cf6', '#10b981', '#f59e0b', '#3b82f6', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
        });
    }

    // ... (Rest of the code remains the same)

async function fetchData() {
    const { data, error } = await supabaseClient.from("complaints").select("*").order("created_at", { ascending: false });
    if (error) return;

    const tbody = document.getElementById("adminTableBody");
    tbody.innerHTML = "";
    let heatPoints = [];
    let zonal = { North: 0, Central: 0, South: 0 };
    let categoryCounts = { 'Pothole': 0, 'Garbage': 0, 'Drainage': 0, 'Streetlight': 0, 'Water Leakage': 0, 'Other': 0 };

    data.forEach(c => {
        const lat = parseFloat(c.latitude), lng = parseFloat(c.longitude);
        if (isNaN(lat) || isNaN(lng)) return;
        
        let zone = lat > 13.02 ? "North" : lat < 12.93 ? "South" : "Central";
        zonal[zone]++;

        // --- ENHANCED SEVERITY LOGIC ---
        if (c.status !== "Resolved") {
            /* Even with fewer issues, we boost the 'Intensity' (0.9) 
               and the 'Radius' in the HeatLayer settings below.
            */
            heatPoints.push([lat, lng, 0.9]); 
        }

        if (categoryCounts.hasOwnProperty(c.issue)) {
            categoryCounts[c.issue]++;
        } else {
            categoryCounts['Other']++;
        }

        const notifyAction = (c.status === "Resolved") 
            ? `<button class="sms-btn" onclick="sendSMS('${c.phone}','${c.complaint_id}','${c.status}')">Notify & Close</button>`
            : `<span class="status-pill-pending">In Progress</span>`;

        tbody.innerHTML += `
            <tr>
                <td><img src="${c.image_url}" class="img-preview" onclick="window.open(this.src)"></td>
                <td><b>${c.complaint_id}</b></td>
                <td>${zone}</td>
                <td>${c.issue}</td>
                <td>
                    <select onchange="updateStatus('${c.complaint_id}', this.value)">
                        <option value="Pending" ${c.status === "Pending" ? "selected" : ""}>Waiting</option>
                        <option value="In Progress" ${c.status === "In Progress" ? "selected" : ""}>Action</option>
                        <option value="Resolved" ${c.status === "Resolved" ? "selected" : ""}>Fixed</option>
                    </select>
                </td>
                <td>${notifyAction}</td>
            </tr>`;
    });

    // Update Totals
    document.getElementById("count-North").innerText = zonal.North;
    document.getElementById("count-Central").innerText = zonal.Central;
    document.getElementById("count-South").innerText = zonal.South;

    // --- RE-RENDER HEATMAP WITH HIGH VISIBILITY ---
    if (heatLayer) map.removeLayer(heatLayer);
    
    /* Radius increased to 35 and Blur to 20. 
       This makes even 1 or 2 issues look like a significant "Hotspot".
    */
    heatLayer = L.heatLayer(heatPoints, { 
        radius: 35, 
        blur: 20, 
        max: 1.0, 
        gradient: {
            0.2: '#4f46e5', // Deep Indigo (Low Density)
            0.5: '#f59e0b', // Amber (Medium Density)
            0.8: '#ef4444'  // Critical Red (High Severity)
        } 
    }).addTo(map);

    // Update Pie Chart
    dispatchChart.data.datasets[0].data = [
        categoryCounts['Pothole'], 
        categoryCounts['Garbage'], 
        categoryCounts['Drainage'], 
        categoryCounts['Streetlight'], 
        categoryCounts['Water Leakage'], 
        categoryCounts['Other']
    ];
    dispatchChart.update();
}

    async function updateStatus(id, newStatus) {
        await supabaseClient.from("complaints").update({ status: newStatus }).eq("complaint_id", id);
        fetchData();
    }

    async function sendSMS(phone, id, status) {
        const cleanPhone = phone.replace(/\D/g, "").slice(-10);
        const apiKey = "iKaO6T5UqemcwfY2ZJrNQHd9uGDon8tsXIAz3P4lFvE1RxMSkVCKyT0VaNIGtxzUqpgrQ7Ycv6hRMA8F";
        const msg = `CivicEye: Your complaint #${id} is resolved!`;
        const smsUrl = `https://www.fast2sms.com/dev/bulkV2?authorization=${apiKey}&route=q&message=${encodeURIComponent(msg)}&language=english&flash=0&numbers=${cleanPhone}`;
        
        const smsWindow = window.open(smsUrl, "smsTask", "width=10,height=10");
        setTimeout(async () => {
            if (smsWindow) smsWindow.close();
            await supabaseClient.from("complaints").delete().eq("complaint_id", id);
            alert(`✅ Ticket #${id} Closed.`);
            fetchData();
        }, 1500);
    }
</script>
</body>
</html>
