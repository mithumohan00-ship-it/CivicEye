<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicEye | Bengaluru City Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* Default Dark Theme variables */
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
        }

        [data-theme="light"] {
            /* Professional Light Theme variables */
            --bg: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #4f46e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%);
            transition: background 0.3s ease, color 0.3s ease;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; margin-bottom: 30px; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; }
        
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 2.8rem; background: linear-gradient(to right, var(--text-main), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .analytics-grid { display: grid; grid-template-columns: 1.5fr 2fr 1.5fr; gap: 20px; margin-bottom: 30px; }
        
        .insight-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            padding: 25px; 
            border-radius: 24px; 
            backdrop-filter: blur(10px); 
        }

        .card-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        
        .timeline-row { display: grid; grid-template-columns: 80px 1fr 60px; align-items: center; gap: 10px; margin-bottom: 15px; }
        .progress-track { height: 8px; background: var(--glass-border); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 1.5s; }

        .timer-display { font-size: 3rem; font-weight: 700; color: #fbbf24; margin: 10px 0; }
        
        .status-tag { 
            display: inline-block; padding: 5px 12px; border-radius: 50px; font-size: 0.65rem; 
            font-weight: 800; background: rgba(16, 185, 129, 0.1); color: #10b981; 
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .panel { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px; }
        .chart-container { height: 300px; position: relative; }

        @media (max-width: 1000px) { .analytics-grid, .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="padding: 12px 5%; margin-bottom: 20px; background: var(--glass); border-bottom: 1px solid var(--glass-border);">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-weight: 500;">← Back to Home</a>
    </div>
    <div class="hero">
        <h1>Bengaluru Live Insights</h1>
        <p style="color: var(--text-muted);">Real-time transparency into our city's resolution speed.</p>
    </div>

    

    <div class="analytics-grid">
        <div class="insight-card">
            <span class="card-label">Ground Activity</span>
            <div style="height: 140px; position: relative;">
                <canvas id="wipGauge"></canvas>
                <div style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                    <h2 id="wip-count" style="color: var(--text-main);">0</h2>
                    <p style="font-size: 0.6rem; color: var(--text-muted);">ACTIVE TEAMS</p>
                </div>
            </div>
        </div>
        <div class="insight-card">
            <span class="card-label">Resolution Story</span>
            <div class="timeline-container" id="timelineUI"></div>
        </div>
        <div class="insight-card" style="text-align: center;">
            <span class="card-label">Backlog Clearance</span>
            <div class="timer-display" id="est-time">--</div>
            <div id="status-tag" class="status-tag">OPTIMAL FLOW</div>
            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 15px;">Avg 2.5h/task</p>
        </div>
    </div>

    <div class="grid-layout">
        <div class="panel">
            <h3 style="color: var(--text-main);">Department Load</h3>
            <div class="chart-container"><canvas id="publicDeptChart"></canvas></div>
        </div>
        <div class="panel">
            <h3 style="color: var(--text-main);">Issue Distribution</h3>
            <div class="chart-container"><canvas id="issueBarChart"></canvas></div>
        </div>
    </div>

    <script>
        const chartTextColor = '#475569';
        const supabaseUrl = "https://gxtyigjradpdywjrjqhu.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4dHlpZ2pyYWRwZHl3anJqcWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjU0NTgsImV4cCI6MjA4ODkwMTQ1OH0.1lPh99Ut6Fv5ViJ_yysOwwpKk5keaKJTUaqKzFXs_70";
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        let wipChartInstance;

        async function fetchCityInsights() {
            const { data, error } = await _supabase.from('complaints').select('*');
            if (error) return;
            const stats = { 
                total: data.length, 
                pending: data.filter(c => c.status === 'Pending').length, 
                progress: data.filter(c => c.status === 'In Progress').length, 
                resolved: data.filter(c => c.status === 'Resolved').length 
            };
            renderWIPGauge(stats); 
            renderTimeline(stats); 
            updatePredictiveTimer(stats);
            
            let deptData = {}, issueData = {};
            data.forEach(c => { 
                deptData[c.department || "General"] = (deptData[c.department || "General"] || 0) + 1; 
                issueData[c.issue || "Other"] = (issueData[c.issue || "Other"] || 0) + 1; 
            });
            renderDoughnut(deptData); 
            renderBar(issueData);
        }

        function renderTimeline(stats) {
            const ui = document.getElementById('timelineUI');
            const stages = [
                { label: 'Waiting', count: stats.pending, color: '#ef4444' }, 
                { label: 'Fixing', count: stats.progress, color: '#6366f1' }, 
                { label: 'Fixed', count: stats.resolved, color: '#10b981' }
            ];
            ui.innerHTML = stages.map(s => `
                <div class="timeline-row">
                    <span style="font-size: 0.7rem; color: var(--text-muted); font-weight:bold;">${s.label}</span>
                    <div class="progress-track"><div class="progress-fill" style="width: ${(s.count/stats.total*100).toFixed(0)}%; background: ${s.color}"></div></div>
                    <span style="font-size: 0.8rem; font-weight: 700; text-align: right; color: var(--text-main);">${s.count}</span>
                </div>`).join('');
        }

        function renderWIPGauge(stats) {
            document.getElementById('wip-count').innerText = stats.progress;
            const ctx = document.getElementById('wipGauge').getContext('2d');
            if(wipChartInstance) wipChartInstance.destroy();
            wipChartInstance = new Chart(ctx, { 
                type: 'doughnut', 
                data: { 
                    datasets: [{ 
                        data: [stats.progress, stats.total - stats.progress], 
                        backgroundColor: ['#6366f1', 'rgba(0,0,0,0.05)'], 
                        borderWidth: 0 
                    }] 
                }, 
                options: { cutout: '85%', rotation: -90, circumference: 180, plugins: { legend: { display: false } } } 
            });
        }

        function updatePredictiveTimer(stats) {
            const hours = (stats.pending * 2.5).toFixed(1); 
            document.getElementById('est-time').innerText = hours + "h";
            if (hours > 24) { 
                const tag = document.getElementById('status-tag'); 
                tag.innerText = "HEAVY LOAD"; 
                tag.style.color = "#ef4444"; 
                tag.style.background = "rgba(239, 68, 68, 0.1)"; 
            }
        }

        function renderDoughnut(data) { 
            new Chart(document.getElementById('publicDeptChart'), { 
                type: 'doughnut', 
                data: { 
                    labels: Object.keys(data), 
                    datasets: [{ 
                        data: Object.values(data), 
                        backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#3b82f6', '#ef4444'], 
                        borderWidth: 0 
                    }] 
                }, 
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: chartTextColor, usePointStyle: true, font: { size: 10 } } } 
                    } 
                } 
            }); 
        }

        function renderBar(data) { 
            new Chart(document.getElementById('issueBarChart'), { 
                type: 'bar', 
                data: { 
                    labels: Object.keys(data), 
                    datasets: [{ 
                        label: 'Reports',
                        data: Object.values(data), 
                        backgroundColor: 'rgba(99, 102, 241, 0.2)', 
                        borderColor: '#6366f1', 
                        borderWidth: 2, 
                        borderRadius: 5 
                    }] 
                }, 
                options: { 
                    indexAxis: 'y', 
                    scales: { 
                        x: { display: false }, 
                        y: { 
                            ticks: { color: chartTextColor, font: { size: 10 } }, 
                            grid: { display: false } 
                        } 
                    }, 
                    plugins: { legend: { display: false } } 
                } 
            }); 
        }

        fetchCityInsights();
    </script>
</body>
</html>
